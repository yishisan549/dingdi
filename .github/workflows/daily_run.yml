name: 每日顶底分型筛选

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除Node警告
    steps:
      - uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # 改用3.11更稳定

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas==2.2.1

      - name: 运行股票脚本
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python stock_fractal.py

